<div class="change-password-card animate-fade-in">
  <div class="card-header">
    <div class="icon-box">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    </div>
    <div>
      <h3 class="card-title">Security & Account</h3>
      <p class="card-subtitle">Change your account password below</p>
    </div>
  </div>

  <div class="card-body">
    <!-- MESSAGES -->
    <div *ngIf="error" class="banner error animate-slide-down">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
      {{ error }}
    </div>

    <div *ngIf="success" class="banner success animate-slide-down">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      {{ success }}
    </div>

    <form (ngSubmit)="submit()" class="password-form">
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <input type="password"
               [(ngModel)]="data.currentPassword"
               name="currentPassword"
               required
               placeholder="********"
               class="form-input" />
      </div>

      <div class="divider"></div>

      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password"
               [(ngModel)]="data.newPassword"
               name="newPassword"
               required
               minlength="6"
               placeholder="Min 6 characters"
               class="form-input" />
      </div>

      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password"
               [(ngModel)]="data.confirmNewPassword"
               name="confirmNewPassword"
               required
               placeholder="********"
               class="form-input" />
      </div>

      <button type="submit"
              [disabled]="loading || !data.currentPassword || !data.newPassword || !data.confirmNewPassword"
              class="submit-btn">
        <span *ngIf="!loading">Update Password</span>
        <div *ngIf="loading" class="spinner"></div>
      </button>
    </form>
  </div>
</div>
