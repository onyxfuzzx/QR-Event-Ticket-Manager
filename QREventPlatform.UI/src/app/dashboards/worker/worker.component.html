<div class="scanner-wrapper">

  <!-- HEADER -->
  <header class="scanner-header">
    <div class="scanner-brand">
      <div class="scanner-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
      </div>
      <div>
        <h1 class="scanner-title">Ticket Scanner</h1>
        <p class="scanner-subtitle">Scan &amp; validate event tickets</p>
      </div>
    </div>
    <button class="scanner-logout" (click)="logout()">Logout</button>
  </header>

  <div class="scanner-body">

    <!-- RESULT BANNER -->
    <div *ngIf="result" class="result-banner animate-pop"
         [ngClass]="{
           'result-valid': result==='VALID',
           'result-invalid': result==='INVALID',
           'result-revalidated': result==='REVALIDATED'
         }">
      <div class="result-icon">
        <svg *ngIf="result==='VALID'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <svg *ngIf="result==='INVALID'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        <svg *ngIf="result==='REVALIDATED'" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </div>
      <div>
        <div class="result-status">{{ result }}</div>
        <div class="result-message">{{ message }}</div>
      </div>
    </div>

    <!-- SCAN BUTTON -->
    <button class="scan-btn"
            [disabled]="loading"
            (click)="openScanner()">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      {{ loading ? 'Scanning…' : 'Scan QR Code' }}
    </button>

    <!-- MANUAL INPUT -->
    <div class="manual-input">
      <input class="manual-field"
             placeholder="Or enter ticket code manually…"
             [(ngModel)]="code"
             (keyup.enter)="validate()" />
      <button class="validate-btn" [disabled]="loading" (click)="validate()">
        Validate
      </button>
    </div>

    <!-- HISTORY -->
    <div class="history-section">
      <h3 class="history-title">Recent Scans</h3>

      <div *ngIf="!scanHistory.length" class="history-empty">
        No scans yet – start scanning tickets
      </div>

      <ul class="history-list">
        <li *ngFor="let h of scanHistory" class="history-item">
          <div class="history-left">
            <span class="history-badge"
                  [ngClass]="{
                    'badge-valid': h.status==='VALID',
                    'badge-invalid': h.status==='INVALID',
                    'badge-revalidated': h.status==='REVALIDATED'
                  }">
              {{ h.status }}
            </span>
            <span class="history-code">{{ h.code }}</span>
          </div>
          <span class="history-time">{{ h.time | date:'shortTime' }}</span>
        </li>
      </ul>
    </div>

    <!-- CAMERA MODAL -->
    <app-worker-scanner *ngIf="scannerOpen"
                        (scanned)="onQrScanned($event)"
                        (close)="closeScanner()">
    </app-worker-scanner>

  </div>
</div>
