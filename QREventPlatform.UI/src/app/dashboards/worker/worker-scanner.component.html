<div class="fixed inset-0 z-50 bg-black/90 flex flex-col">

  <!-- HEADER -->
  <div class="flex items-center justify-between px-4 py-3 text-white">
    <h2 class="text-lg font-semibold">Scan Ticket</h2>
    <button (click)="stopCamera()"
            class="text-red-400 text-2xl font-bold active:scale-90 transition">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- CAMERA AREA -->
  <div class="flex-1 flex items-center justify-center px-4">
    <div class="relative w-full max-w-md">

      <video #video
             autoplay
             playsinline
             muted
             class="w-full rounded-xl border-2 border-white/20 bg-black">
      </video>

      <!-- SCAN FRAME -->
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
        <div class="w-56 h-56 border-4 border-green-400 rounded-xl animate-pulse"></div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <div class="p-4 text-center text-slate-300 text-sm">
    Align QR code inside the box
  </div>

  <!-- ERROR -->
  <div *ngIf="error"
       class="absolute bottom-20 left-0 right-0 text-center text-red-400 text-sm px-4">
    {{ error }}
  </div>

</div>
