<div class="login-wrapper">
  <!-- Decorative background orbs -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="login-card animate-fade-in">

    <!-- LOGO / BRAND -->
    <div class="brand-section">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h1 class="brand-title">New Password</h1>
      <p class="brand-subtitle">Choose a secure password for your account</p>
    </div>

    <!-- ERROR MESSAGES -->
    <div *ngIf="error" class="error-banner animate-slide-down">
      {{ error }}
    </div>

    <div *ngIf="success" class="error-banner animate-slide-down" style="background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.3); color: #6ee7b7;">
      Success! Password updated. You can now log in.
    </div>

    <!-- FORM -->
    <form *ngIf="!success && token" (ngSubmit)="submit()" class="login-form">

      <!-- NEW PASSWORD -->
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password"
                 [(ngModel)]="data.newPassword"
                 name="newPassword"
                 required
                 minlength="6"
                 placeholder="********"
                 class="form-input" />
        </div>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password"
                 [(ngModel)]="data.confirmPassword"
                 name="confirmPassword"
                 required
                 placeholder="********"
                 class="form-input" />
        </div>
      </div>

      <!-- SUBMIT BUTTON -->
      <button type="submit"
              [disabled]="loading || !data.newPassword || !data.confirmPassword"
              class="login-btn">
        <span *ngIf="!loading">Reset Password</span>
        <div *ngIf="loading" class="spinner"></div>
      </button>

      <div class="forgot-link-wrapper" style="text-align: center;">
        <a routerLink="/login" class="forgot-link">Wait, I remember my password!</a>
      </div>
    </form>

    <div *ngIf="success || !token" class="login-form">
        <button routerLink="/login" class="login-btn">
          <span>Go to Login</span>
        </button>
    </div>

  </div>
</div>
