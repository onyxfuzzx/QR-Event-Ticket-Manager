<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 via-white to-blue-50 px-4">

  <div class="w-full max-w-sm bg-white rounded-2xl shadow-xl p-7
              animate-fade-in">

    <!-- LOGO / BRAND -->
    <div class="mb-6 text-center">


      <h2 class="text-2xl font-semibold text-gray-900 tracking-tight">
        QR Event Platform
      </h2>
      <p class="text-sm text-gray-500 mt-1">
        Secure login for admins & staff
      </p>
    </div>

    <!-- FORM -->
    <form (ngSubmit)="login()" class="space-y-4">

      <!-- EMAIL -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">
          Email
        </label>
        <input type="email"
               [(ngModel)]="email"
               name="email"
               required
               placeholder="you@company.com"
               class="w-full px-4 py-2.5 rounded-xl border
                      border-gray-300 text-gray-900
                      focus:ring-2 focus:ring-blue-500
                      focus:border-blue-500
                      transition" />
      </div>

      <!-- PASSWORD -->
      <!-- PASSWORD -->
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">
          Password
        </label>

        <div class="relative">
          <input [type]="showPassword ? 'text' : 'password'"
                 [(ngModel)]="password"
                 name="password"
                 required
                 placeholder="••••••••"
                 class="w-full px-4 py-2.5 pr-11 rounded-xl border
             border-gray-300 text-gray-900
             focus:ring-2 focus:ring-blue-500
             focus:border-blue-500
             transition" />

          <!-- EYE BUTTON -->
          <button type="button"
                  (click)="togglePassword()"
                  class="absolute inset-y-0 right-3 flex items-center
             text-gray-400 hover:text-gray-600
             transition">

            <!-- Eye Open -->
            <svg *ngIf="!showPassword"
                 xmlns="http://www.w3.org/2000/svg"
                 class="h-5 w-5"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor">
              <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5
                 c4.478 0 8.268 2.943 9.542 7
                 -1.274 4.057-5.064 7-9.542 7
                 -4.477 0-8.268-2.943-9.542-7z" />
            </svg>

            <!-- Eye Off -->
            <svg *ngIf="showPassword"
                 xmlns="http://www.w3.org/2000/svg"
                 class="h-5 w-5"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke="currentColor">
              <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19
                 c-4.478 0-8.268-2.943-9.542-7
                 a9.956 9.956 0 012.042-3.368" />
              <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6.223 6.223A9.956 9.956 0 0112 5
                 c4.478 0 8.268 2.943 9.542 7
                 a9.96 9.96 0 01-4.043 5.132" />
              <path stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M3 3l18 18" />
            </svg>
          </button>
        </div>
      </div>

      <!-- BUTTON -->
      <button type="submit"
              [disabled]="loading"
              class="w-full py-3 rounded-xl
               flex items-center justify-center gap-2
               text-white font-semibold
               bg-gradient-to-r from-blue-600 to-indigo-600
               hover:from-blue-700 hover:to-indigo-700
               active:scale-[0.98]
               disabled:opacity-60
               transition-all duration-200
               shadow-lg">

        <ng-container *ngIf="!loading">
          Login
        </ng-container>

        <ng-container *ngIf="loading">
          <div class="loader"></div>
          <span class="text-sm">Signing in…</span>
        </ng-container>

      </button>

    </form>

    <!-- FOOTER -->
    <div class="mt-6 text-center text-xs text-gray-400">
      Built for events • Made in India 🇮🇳
    </div>

  </div>
</div>
