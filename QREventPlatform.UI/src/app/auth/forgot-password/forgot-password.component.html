<div class="login-wrapper">
  <!-- Decorative background orbs -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="login-card animate-fade-in">

    <!-- LOGO / BRAND -->
    <div class="brand-section">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M12 16v-4"></path>
          <path d="M12 8h.01"></path>
        </svg>
      </div>
      <h1 class="brand-title">Forgot Password</h1>
      <p class="brand-subtitle">Enter your email to receive a reset link</p>
    </div>

    <!-- ERROR/SUCCESS MESSAGES -->
    <div *ngIf="error" class="error-banner animate-slide-down">
      {{ error }}
    </div>

    <div *ngIf="message" class="error-banner animate-slide-down" style="background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.3); color: #6ee7b7;">
      {{ message }}
    </div>

    <!-- FORM -->
    <form *ngIf="!message" (ngSubmit)="submit()" class="login-form">

      <!-- EMAIL -->
      <div class="form-group">
        <label class="form-label">Email address</label>
        <div class="input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <input type="email"
                 [(ngModel)]="email"
                 name="email"
                 required
                 placeholder="you&#64;company.com"
                 class="form-input" />
        </div>
      </div>

      <!-- SUBMIT BUTTON -->
      <button type="submit"
              [disabled]="loading || !email"
              class="login-btn">
        <span *ngIf="!loading">Send Reset Link</span>
        <div *ngIf="loading" class="spinner"></div>
      </button>

      <div class="forgot-link-wrapper" style="text-align: center;">
        <a routerLink="/login" class="forgot-link">Back to Sign In</a>
      </div>
    </form>
    
    <div *ngIf="message" class="login-form">
        <button routerLink="/login" class="login-btn">
          <span>Go to Login</span>
        </button>
    </div>

  </div>
</div>
